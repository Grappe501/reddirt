services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reddirt
      POSTGRES_PASSWORD: reddirt
      POSTGRES_DB: reddirt
    ports:
      # Use 5433 on host to avoid clashing with a local PostgreSQL install on 5432
      - "5433:5432"
    volumes:
      - reddirt_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddirt -d reddirt"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  reddirt_pg:
