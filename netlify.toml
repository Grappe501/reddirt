# Red Dirt — Netlify
# Production build: `scripts/netlify-build.sh` runs Prisma migrations then `next build`.
# Prisma needs DATABASE_URL at build time. Set it in Netlify env, or rely on Neon’s
# NETLIFY_DATABASE_URL (the script maps it to DATABASE_URL).
# Optional at runtime: OPENAI_* for AI/search. Ingest is manual/scheduled — not in build.

[build]
  command = "bash scripts/netlify-build.sh"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: document dev port alignment
# [dev]
#   command = "npm run dev"
